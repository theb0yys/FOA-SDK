name: Tainted Grail Repository Hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tg-repository-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-tracked-paths:
    name: Validate tracked path portability
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test tracked-path collision validator
        run: >-
          python -m unittest discover
          -s Gems/TaintedGrailModdingSDK/Tools/tests
          -p "test_validate_tracked_path_collisions.py" -v

      - name: Validate all tracked paths
        run: python Gems/TaintedGrailModdingSDK/Tools/validate_tracked_path_collisions.py
