name: TG SDK bug report
description: Report a reproducible defect in the Tainted Grail Modding Editor or SDK
title: "[TG SDK Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a defect. Do not include security vulnerabilities, secrets, private paths, copyrighted game assets, or proprietary source material. Security reports follow SECURITY.md.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I read the User Guide and Support policy.
          required: true
        - label: This is not a security vulnerability or conduct report.
          required: true
        - label: I removed secrets, personal paths, and proprietary game data.
          required: true
  - type: input
    id: commit
    attributes:
      label: Project commit or release
      description: Exact commit SHA or release version where the problem occurs.
      placeholder: 0123456789abcdef...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - SDK Status / workspace
        - Pack Manager
        - Source Intake
        - Catalog / record inspector
        - Validation / blockers
        - Persistence / schema
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, Ubuntu 24.04, macOS...
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: O3DE build configuration and compiler
      placeholder: Profile, MSVC version / Clang version
    validations:
      required: true
  - type: textarea
    id: game_profile
    attributes:
      label: Relevant FoA game-profile details
      description: Include exact game version, branch, Mono/IL2CPP, Unity/BepInEx versions when relevant. Do not include personal paths.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest clean sequence that reproduces the problem.
      placeholder: |
        1. Open...
        2. Configure...
        3. Select...
        4. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Data, save, deployment, or security impact
      description: State whether workspace files, game files, deployments, or saves changed.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs and screenshots
      description: Paste only relevant excerpts. Remove private paths, secrets, and proprietary content.
      render: text
    validations:
      required: false
  - type: textarea
    id: fixture
    attributes:
      label: Minimal redistributable fixture or document
      description: Provide a small legal sample when the issue involves parsing or persistence.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Additional context
    validations:
      required: false
