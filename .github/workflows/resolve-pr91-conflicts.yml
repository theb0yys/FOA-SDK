name: Resolve PR 91 conflicts

on:
  push:
    branches:
      - agent/harden-validation-pipeline

permissions:
  contents: write

concurrency:
  group: resolve-pr91-conflicts
  cancel-in-progress: false

jobs:
  resolve:
    name: Merge current main and resolve governed overlaps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-validation-pipeline
          fetch-depth: 0
          lfs: true
          persist-credentials: true

      - name: Merge current main and resolve expected overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "FOA-SDK Conflict Resolver"
          git config user.email "264552926+theb0yys@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          mapfile -t conflicts < <(git diff --name-only --diff-filter=U | sort)
          expected=(
            "Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_installer_workflow.py"
            "Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_repository_structure.py"
            "Gems/TaintedGrailModdingSDK/Tools/validate_repository_structure.py"
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)

          if [[ $merge_status -ne 0 ]] && [[ ${#conflicts[@]} -eq 0 ]]; then
            echo "Merge failed without ordinary file conflicts." >&2
            exit 1
          fi
          if [[ "${conflicts[*]}" != "${expected_sorted[*]}" ]]; then
            echo "Unexpected conflict set." >&2
            printf 'Expected: %s\n' "${expected_sorted[*]}" >&2
            printf 'Actual:   %s\n' "${conflicts[*]}" >&2
            exit 1
          fi

          # The installer workflow test follows the newer root-owned installer contract from main.
          git checkout --theirs -- Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_installer_workflow.py

          # Start the repository-structure files from main, then add this PR's mandatory
          # automatic-static-workflow contract without weakening the new installer rules.
          git checkout --theirs -- \
            Gems/TaintedGrailModdingSDK/Tools/validate_repository_structure.py \
            Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_repository_structure.py

          python - <<'PY'
          from pathlib import Path

          validator = Path("Gems/TaintedGrailModdingSDK/Tools/validate_repository_structure.py")
          text = validator.read_text(encoding="utf-8")
          constant_anchor = 'PLUGIN_PACKAGE_NAME = re.compile(r"^[A-Za-z][A-Za-z0-9._-]{0,127}$")\n'
          constant = (
              'AUTOMATIC_STATIC_WORKFLOW = (\n'
              '    ".github/workflows/tainted-grail-sdk-pr-validation.yml"\n'
              ')\n'
          )
          if "AUTOMATIC_STATIC_WORKFLOW" not in text:
              if constant_anchor not in text:
                  raise SystemExit("repository validator constant anchor missing")
              text = text.replace(constant_anchor, constant_anchor + constant, 1)

          github_anchor = '    ".github/PULL_REQUEST_TEMPLATE.md",\n'
          github_entry = '    AUTOMATIC_STATIC_WORKFLOW,\n'
          if github_entry not in text:
              if github_anchor not in text:
                  raise SystemExit("repository validator GitHub allow-list anchor missing")
              text = text.replace(github_anchor, github_anchor + github_entry, 1)

          required_anchor = 'REQUIRED_PATHS = {\n    ".github/CODEOWNERS",\n'
          required_replacement = (
              'REQUIRED_PATHS = {\n'
              '    ".github/CODEOWNERS",\n'
              '    AUTOMATIC_STATIC_WORKFLOW,\n'
          )
          if required_replacement not in text:
              if required_anchor not in text:
                  raise SystemExit("repository validator required-path anchor missing")
              text = text.replace(required_anchor, required_replacement, 1)
          validator.write_text(text, encoding="utf-8")

          tests = Path("Gems/TaintedGrailModdingSDK/Tools/tests/test_validate_repository_structure.py")
          text = tests.read_text(encoding="utf-8")
          method_name = "test_automatic_static_workflow_is_required"
          if method_name not in text:
              anchor = (
                  "    def test_reviewed_product_tree_passes(self) -> None:\n"
                  "        contract.validate_paths(valid_tree())\n\n"
              )
              addition = (
                  "    def test_automatic_static_workflow_is_required(self) -> None:\n"
                  "        self.assertIn(\n"
                  "            contract.AUTOMATIC_STATIC_WORKFLOW,\n"
                  "            contract.ALLOWED_GITHUB_FILES,\n"
                  "        )\n"
                  "        self.assertIn(\n"
                  "            contract.AUTOMATIC_STATIC_WORKFLOW,\n"
                  "            contract.REQUIRED_PATHS,\n"
                  "        )\n"
                  "        paths = valid_tree() - {contract.AUTOMATIC_STATIC_WORKFLOW}\n"
                  "        with self.assertRaisesRegex(\n"
                  "            contract.RepositoryStructureError,\n"
                  "            \"missing required\",\n"
                  "        ):\n"
                  "            contract.validate_paths(paths)\n\n"
              )
              if anchor not in text:
                  raise SystemExit("repository test insertion anchor missing")
              text = text.replace(anchor, anchor + addition, 1)
          tests.write_text(text, encoding="utf-8")
          PY

          rm .github/workflows/resolve-pr91-conflicts.yml
          git add -A

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved conflicts remain." >&2
            git diff --name-only --diff-filter=U >&2
            exit 1
          fi

          git diff --cached --check
          python -m unittest discover \
            -s Gems/TaintedGrailModdingSDK/Tools/tests \
            -p "test_validate_installer_workflow.py" -v
          python -m unittest discover \
            -s Gems/TaintedGrailModdingSDK/Tools/tests \
            -p "test_validate_repository_structure.py" -v
          python Gems/TaintedGrailModdingSDK/Tools/validate_installer_workflow.py
          python Gems/TaintedGrailModdingSDK/Tools/validate_repository_structure.py

          git commit -s -m "Merge current main and resolve validation conflicts"
          git push origin HEAD:agent/harden-validation-pipeline
