name: FOA-SDK failed build diagnostics

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/foa-sdk-failure-tail.yml

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      FAILED_JOB_ID: '89127157328'
    steps:
      - name: Download and report failed step tail
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" > failed-job.log
          tail -n 180 failed-job.log > failed-tail.log
          {
            echo 'Failed canonical inventory-build diagnostic tail:'
            echo
            echo '```text'
            cat failed-tail.log
            echo '```'
          } > comment.md
          gh pr comment 180 --repo "$REPOSITORY" --body-file comment.md
